name: abadgar
description: "A mobile-first financial tracker for Rice/Wheat farmers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Backend & Sync
  powersync: ^2.0.1
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  file_picker: ^6.1.1
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.4
  http: ^1.2.0
  
  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  riverpod_lint: ^2.3.9
  custom_lint: ^0.6.0

flutter:
  uses-material-design: true
  assets:
    - .env
