name: abadgar
description: "A mobile-first financial tracker for Rice/Wheat farmers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Backend & Sync
  powersync: ^2.0.1
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0
  go_router: ^14.0.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  path_provider: ^2.1.2
  share_plus: ^10.1.0
  file_picker: ^8.0.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.0
  http: ^1.2.0
  shared_preferences: ^2.3.3
  
  # UI & Design
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  
  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1
  
  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  riverpod_lint: ^2.3.9
  custom_lint: ^0.6.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0D7377"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#001F1F"
  image: assets/logo.png
  android_12:
    color: "#001F1F"
    icon_background_color: "#001F1F"
    image: assets/logo.png
  fullscreen: true
